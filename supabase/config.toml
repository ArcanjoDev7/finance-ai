project_id = "hscntenrmukmzsdpftqd"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://arcanjodev7.github.io/finance-ai/"
additional_redirect_urls = ["http://127.0.0.1:7360/", "http://localhost:7360/", "https://arcanjodev7.github.io/finance-ai/"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m"
otp_length = 8

[auth.rate_limit]
email_sent = 2
sign_in_sign_ups = 30
token_verifications = 30
token_refresh = 150
anonymous_users = 30

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.external.google]
enabled = false

[auth.external.apple]
enabled = false

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.vector]
enabled = false

[functions.health]
verify_jwt = false

[functions.chat]
verify_jwt = true

[functions.download]
verify_jwt = false

[functions.qr]
verify_jwt = false
